global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:19090']

  - job_name: lm_exporter
    static_configs:
      - targets: ['127.0.0.1:9401']

  - job_name: fnos_transfer_exporter
    static_configs:
      - targets: ['127.0.0.1:9402']
