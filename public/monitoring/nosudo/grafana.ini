[server]
http_addr = 127.0.0.1
http_port = 13000

enable_gzip = true

[security]
admin_user = admin
admin_password = CHANGE_ME_FIRST_LOGIN

[users]
allow_sign_up = false

auto_assign_org = true

[paths]
provisioning = __PROVISIONING__
data = __ROOT__/data/grafana
logs = __ROOT__/logs
plugins = __ROOT__/data/grafana/plugins
