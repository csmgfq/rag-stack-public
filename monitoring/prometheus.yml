global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: process
    static_configs:
      - targets: ['process-exporter:9256']

  - job_name: nvidia_gpu
    static_configs:
      - targets: ['dcgm-exporter:9400']
